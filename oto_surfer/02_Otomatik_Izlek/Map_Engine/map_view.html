<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Map Station Engine</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #12141d; overflow: hidden; }
        #map { width: 100%; height: 100%; background: #12141d; }
        
        .manual-draw-panel {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: rgba(27, 30, 41, 0.95); padding: 12px; border-radius: 8px;
            border: 1px solid #00d2ff; display: flex; flex-direction: column; gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .draw-btn {
            background: #0088cc; color: white; border: none; padding: 10px;
            cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 11px;
            transition: 0.3s;
        }
        .draw-btn:hover { background: #00aaff; }
    </style>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
</head>
<body>

    <div class="manual-draw-panel">
        <button class="draw-btn" onclick="startCircle()">🔴 DAİRE ÇİZ</button>
        <button class="draw-btn" style="background:#c0392b" onclick="haritayiTemizle()">🗑️ SEÇİMİ TEMİZLE</button>
        <div id="area-info" style="color:#f1c40f; font-size:11px; text-align:center; font-weight:bold;">SİSTEM HAZIR</div>
    </div>

    <div id="map"></div>

    <script>
        var map;
        var drawnItems;
        var isReady = false;
        var sonNoktalar = [];

        function init() {
            if (typeof L !== 'undefined' && typeof L.Control.Draw !== 'undefined') {
                map = L.map('map', { zoomControl: false }).setView([37.626651, 37.983352], 16);
                
                L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { maxZoom: 22 }).addTo(map);
                
                drawnItems = new L.FeatureGroup();
                map.addLayer(drawnItems);

                // Çizim bittiğinde yakala
                map.on(L.Draw.Event.CREATED, function (e) {
                    drawnItems.clearLayers();
                    var layer = e.layer;
                    drawnItems.addLayer(layer);
                    
                    try {
                        var area;
                        if (layer instanceof L.Circle) {
                            var radius = layer.getRadius();
                            area = Math.PI * Math.pow(radius, 2);
                        } else {
                            var latlngs = layer.getLatLngs()[0];
                            area = L.GeometryUtil.geodesicArea(latlngs);
                        }
                        document.getElementById('area-info').innerText = "ALAN: " + area.toFixed(2) + " m²";
                    } catch(err) {
                        console.log("Hesaplama hatası:", err);
                    }
                });

                isReady = true;
                console.log("MAP_ENGINE_READY");
            } else {
                setTimeout(init, 500);
            }
        }

        // --- ÇİZİM FONKSİYONU ---
        function startCircle() {
            if (!isReady) return;
            var circleDraw = new L.Draw.Circle(map, { 
                shapeOptions: { 
                    color: '#e74c3c',       // Kırmızı kenar
                    weight: 3,
                    fillColor: '#ff5e57',   // Kırmızı dolgu
                    fillOpacity: 0.2,       // Şeffaf
                    dashArray: '10, 10'
                } 
            });
            circleDraw.enable();
        }

        // --- PYTHON KONTROLLERİ ---
        window.haritayiKaydir = function(lat, lng) {
    if (!isReady) return "NOT_READY";
    var nLat = parseFloat(lat);
    var nLng = parseFloat(lng);
    
    if (!isNaN(nLat) && !isNaN(nLng)) {
        // Haritayı merkeze al ve yakınlaş
        map.setView([nLat, nLng], 19);
        
        // 1. TAM MERKEZE MİNİK BİR NOKTA (Ahanda Burası!)
        L.circleMarker([nLat, nLng], {
            radius: 5,
            color: '#ffffff',      // Beyaz kenar
            fillColor: '#2ecc71',  // Canlı Yeşil iç (Dikkat çekici)
            fillOpacity: 1,
            weight: 2,
            interactive: false
        }).addTo(map).bindTooltip("TAM KONUM", {permanent: true, direction: 'top'}).openTooltip();

        // 2. ETRAFINA SENİN İSTEDİĞİN 15 METRELİK ŞEFFAF DAİRE
        L.circle([nLat, nLng], {
            radius: 15, 
            color: '#e74c3c', 
            fillColor: '#ff5e57', 
            fillOpacity: 0.15,
            weight: 1,
            dashArray: '5, 5' // Hafif kesikli, teknik bir görünüm
        }).addTo(map);

        return "OK";
    }
    return "ERROR";
};

        window.manuelAlanTaramasi = function(aralik) {
            if (!isReady || drawnItems.getLayers().length === 0) return "ALAN_YOK";
            
            var layer = drawnItems.getLayers()[0];
            var bounds = layer.getBounds();
            var noktalar = [];
            var offset = parseFloat(aralik) * 0.000009; 

            for (var lat = bounds.getNorth(); lat > bounds.getSouth(); lat -= offset) {
                var satir = [];
                for (var lng = bounds.getWest(); lng < bounds.getEast(); lng += offset) {
                    satir.push([lat, lng]);
                }
                if (noktalar.length % 2 !== 0) satir.reverse();
                noktalar = noktalar.concat(satir);
            }

            sonNoktalar = noktalar;

            noktalar.forEach(p => {
                L.circleMarker(p, { radius: 2, color: '#f39c12', interactive: false }).addTo(map);
            });
            L.polyline(noktalar, { color: '#2ecc71', weight: 1, opacity: 0.5 }).addTo(map);

            return noktalar.length;
        };

        window.getNoktalar = function() {
            return sonNoktalar.length > 0 ? sonNoktalar : "ALAN_YOK";
        };

        window.haritayiTemizle = function() {
            drawnItems.clearLayers();
            map.eachLayer(function (layer) {
                if (layer instanceof L.CircleMarker || layer instanceof L.Polyline || layer instanceof L.Circle) {
                    if (!layer._url) map.removeLayer(layer);
                }
            });
            sonNoktalar = [];
            document.getElementById('area-info').innerText = "TEMİZLENDİ";
        };

        window.onload = init;
    </script>
</body>
</html>
